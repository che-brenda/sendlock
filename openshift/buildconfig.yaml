# In-cluster image build from the git repo's Containerfile (Docker strategy).
# Alternative: build with podman locally / in CI and push to the internal
# registry — then delete this file and point kustomization.yaml at that image.
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: sendlock
  labels:
    app: sendlock
spec:
  # Local lookup lets pod specs in this project (deployment, migrate job,
  # scheduler cron job) reference the bare `sendlock:latest` — OpenShift
  # resolves it to the internal-registry image at admission, so no manifest
  # ever hardcodes a registry host or namespace.
  lookupPolicy:
    local: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: sendlock
  labels:
    app: sendlock
spec:
  source:
    type: Git
    git:
      uri: https://github.com/che-brenda/sendlock.git
      ref: dev
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: sendlock:latest
  # No triggers: openshift/deploy.sh starts builds explicitly (a ConfigChange
  # trigger would double-build on every apply). Add a GitHub webhook trigger
  # later for build-on-push.
  triggers: []
