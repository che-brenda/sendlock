# In-cluster image build from the git repo's Containerfile (Docker strategy).
# Alternative: build with podman locally / in CI and push to the internal
# registry — then delete this file and point kustomization.yaml at that image.
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: sendlock
  labels:
    app: sendlock
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: sendlock
  labels:
    app: sendlock
spec:
  source:
    type: Git
    git:
      uri: https://github.com/che-brenda/sendlock.git
      ref: dev
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: sendlock:latest
  triggers:
    - type: ConfigChange
  # Start manually with: oc start-build sendlock --follow
  # (add a GitHub webhook trigger later for build-on-push)
