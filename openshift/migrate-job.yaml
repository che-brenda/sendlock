# Deploy-time database setup: migrations + the roles/permissions seed the app
# requires before it is usable. The seeder is idempotent (firstOrCreate /
# syncPermissions), so re-running on every deploy is safe.
#
# Jobs are immutable — delete and re-apply on each deploy:
#   oc delete job sendlock-migrate --ignore-not-found && oc apply -f openshift/migrate-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: sendlock-migrate
  labels:
    app: sendlock
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: sendlock
        job: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          # Resolved via the ImageStream's local lookup policy (buildconfig.yaml),
          # so this file applies unedited in any project.
          image: sendlock:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              php artisan migrate --force
              php artisan db:seed --class=RolesAndPermissionsSeeder --force
          envFrom:
            - configMapRef:
                name: sendlock-config
            - secretRef:
                name: sendlock-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
