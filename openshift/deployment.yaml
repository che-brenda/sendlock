apiVersion: apps/v1
kind: Deployment
metadata:
  name: sendlock
  labels:
    app: sendlock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sendlock
      component: web
  template:
    metadata:
      labels:
        app: sendlock
        # `component: web` distinguishes app pods from the PostgreSQL pods
        # (which also carry `app: sendlock`) so the Service selects only these.
        component: web
    spec:
      containers:
        - name: sendlock
          # Bare image-stream reference, resolved to the internal-registry image
          # by the ImageStream's local lookup policy (buildconfig.yaml) — keeps
          # this manifest namespace-agnostic.
          image: sendlock:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: sendlock-config
            - secretRef:
                name: sendlock-secrets
          # Laravel's built-in health endpoint (bootstrap/app.php: health '/up').
          readinessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
