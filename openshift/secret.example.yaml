# EXAMPLE ONLY — do not apply this file as-is, and never commit real values.
# It is deliberately excluded from kustomization.yaml. Create the real secret with:
#
#   oc create secret generic sendlock-secrets \
#     --from-literal=APP_KEY="$(php artisan key:generate --show)" \
#     --from-literal=DB_USERNAME=sendlock \
#     --from-literal=DB_PASSWORD="$(openssl rand -base64 24)"
#
# Optional paid-integration keys (Twilio, Anthropic, Gemini, VirusTotal, …) can
# be added to the same secret later; the ConfigMap keeps their drivers off until then.
apiVersion: v1
kind: Secret
metadata:
  name: sendlock-secrets
  labels:
    app: sendlock
type: Opaque
stringData:
  APP_KEY: "base64:CHANGEME-run-php-artisan-key-generate-show"
  DB_USERNAME: "sendlock"
  DB_PASSWORD: "CHANGEME"
