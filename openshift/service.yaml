apiVersion: v1
kind: Service
metadata:
  name: sendlock
  labels:
    app: sendlock
spec:
  # `component: web` is required — `app: sendlock` alone also matches the
  # PostgreSQL pods, which would put the DB behind the web route.
  selector:
    app: sendlock
    component: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
