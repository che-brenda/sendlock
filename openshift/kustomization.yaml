apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Not included on purpose:
#   secret.example.yaml — create the real secret manually (see its header)
#   migrate-job.yaml    — Jobs are immutable; delete + re-apply per deploy
resources:
  - buildconfig.yaml
  - configmap.yaml
  - postgresql.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml
  - scheduler-cronjob.yaml

# No images: section needed — pod specs reference the bare `sendlock:latest`,
# resolved in-project by the ImageStream's local lookup policy (buildconfig.yaml),
# so nothing here is namespace-specific.

labels:
  - pairs:
      app.kubernetes.io/name: sendlock
    includeSelectors: false
